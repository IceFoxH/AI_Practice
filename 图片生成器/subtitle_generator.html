<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片字幕生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        
        .form-group input[type="number"],
        .form-group input[type="color"],
        .form-group input[type="file"] {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input[type="number"]:focus,
        .form-group input[type="color"]:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .form-group input[type="file"] {
            padding: 5px;
            cursor: pointer;
        }
        
        .file-info {
            font-size: 13px;
            color: #666;
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            min-width: 200px;
        }
        
        .textarea-container {
            margin-top: 15px;
        }
        
        .textarea-container label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .textarea-container textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        .textarea-container textarea:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-generate {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }
        
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .preview-section {
            margin-top: 30px;
        }
        
        .preview-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .preview-container {
            width: 100%;
            background: #f5f5f5;
            border-radius: 12px;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .preview-container img {
            max-width: 100%;
            max-height: 600px;
            display: block;
        }
        
        .canvas-container {
            position: relative;
            display: inline-block;
        }
        
        .canvas-container canvas {
            display: block;
            max-width: 100%;
        }
        
        .no-image {
            text-align: center;
            color: #999;
            padding: 50px;
        }
        
        .no-image i {
            font-size: 60px;
            margin-bottom: 15px;
            display: block;
        }
        
        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 图片字幕生成器</h1>
        
        <!-- 控制面板 -->
        <div class="form-section">
            <!-- 文件选择 -->
            <div class="form-row">
                <div class="form-group">
                    <label for="imageFile">📷 选择图片</label>
                    <input type="file" id="imageFile" accept="image/*" onchange="handleFileSelect(event)">
                </div>
                <div class="file-info" id="fileInfo">未选择文件</div>
            </div>
            
            <!-- 参数设置 -->
            <div class="form-row">
                <div class="form-group">
                    <label for="subtitleHeight">字幕高度(px)</label>
                    <input type="number" id="subtitleHeight" value="40" min="10" max="200">
                </div>
                <div class="form-group">
                    <label for="fontSize">字体大小(px)</label>
                    <input type="number" id="fontSize" value="20" min="8" max="100">
                </div>
                <div class="form-group">
                    <label for="fontColor">字体颜色</label>
                    <input type="color" id="fontColor" value="#FFFFFF">
                </div>
                <div class="form-group">
                    <label for="strokeColor">轮廓颜色</label>
                    <input type="color" id="strokeColor" value="#000000">
                </div>
            </div>
            
            <!-- 字幕文本 -->
            <div class="textarea-container">
                <label for="subtitleText">📝 字幕内容（每行一句）</label>
                <textarea id="subtitleText" placeholder="请输入字幕内容，每行一句...">别吵
我在给自己写钓鱼网站呢
对，这年头
咱们猫咪都能自己写代码了</textarea>
            </div>
            
            <!-- 操作按钮 -->
            <div class="btn-group">
                <button class="btn-generate" onclick="generateSubtitle()">✨ 生成字幕图片</button>
                <button class="btn-save" onclick="saveImage()">💾 保存图片</button>
            </div>
        </div>
        
        <!-- 预览区域 -->
        <div class="preview-section">
            <h3>👁️ 预览效果</h3>
            <div class="preview-container" id="previewContainer">
                <div class="no-image">
                    <i>🖼️</i>
                    <p>请选择一张图片开始</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let originalImage = null;
        let generatedCanvas = null;
        
        /**
         * 处理文件选择
         */
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 更新文件信息显示
            document.getElementById('fileInfo').textContent = file.name;
            
            // 读取图片
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    showPreview(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        /**
         * 显示预览图片
         */
        function showPreview(img) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';
            
            const canvasContainer = document.createElement('div');
            canvasContainer.className = 'canvas-container';
            
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            
            canvasContainer.appendChild(canvas);
            container.appendChild(canvasContainer);
            
            generatedCanvas = canvas;
        }
        
        /**
         * 生成字幕图片
         */
        function generateSubtitle() {
            if (!originalImage) {
                alert('请先选择一张图片！');
                return;
            }
            
            // 获取参数
            const subtitleHeight = parseInt(document.getElementById('subtitleHeight').value) || 40;
            const fontSize = parseInt(document.getElementById('fontSize').value) || 20;
            const fontColor = document.getElementById('fontColor').value;
            const strokeColor = document.getElementById('strokeColor').value;
            const subtitleText = document.getElementById('subtitleText').value;
            
            // 创建画布
            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d');
            
            // 绘制原图
            ctx.drawImage(originalImage, 0, 0);
            
            // 解析字幕文本
            const lines = subtitleText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) {
                alert('请输入字幕内容！');
                return;
            }
            
            // 计算字幕区域高度和起始位置
            const totalHeight = lines.length * subtitleHeight;
            const startY = canvas.height - totalHeight - 20;
            
            // 创建第一行字幕位置的背景图片（用于所有字幕行的背景）
            const bgImageData = ctx.getImageData(0, startY, canvas.width, subtitleHeight);
            
            // 设置字体
            ctx.font = `bold ${fontSize}px Microsoft YaHei, Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 绘制每行字幕
            lines.forEach((line, index) => {
                const y = startY + index * subtitleHeight + subtitleHeight / 2;
                const lineTopY = startY + index * subtitleHeight;
                
                // 绘制当前行的背景图片（使用第一行位置截取的图片）
                ctx.putImageData(bgImageData, 0, lineTopY);
                
                // 绘制分割线（除了第一行）
                if (index > 0) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, lineTopY);
                    ctx.lineTo(canvas.width, lineTopY);
                    ctx.stroke();
                }
                
                // 绘制文字轮廓（描边效果）
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 4;
                ctx.lineJoin = 'round';
                ctx.strokeText(line, canvas.width / 2, y);
                
                // 绘制文字填充
                ctx.fillStyle = fontColor;
                ctx.fillText(line, canvas.width / 2, y);
            });
            
            // 绘制专属水印"卧龙先生"
            drawWatermark(ctx, canvas.width, canvas.height);
            
            // 更新预览
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';
            
            const canvasContainer = document.createElement('div');
            canvasContainer.className = 'canvas-container';
            canvasContainer.appendChild(canvas);
            container.appendChild(canvasContainer);
            
            generatedCanvas = canvas;
            
            alert('字幕生成成功！');
        }
        
        /**
         * 绘制专属水印
         */
        function drawWatermark(ctx, width, height) {
            const watermarkText = '卧龙先生';
            
            // 设置水印字体和样式
            ctx.font = 'bold 24px Microsoft YaHei, Arial, sans-serif';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            
            // 设置水印颜色（半透明灰色）
            ctx.fillStyle = 'rgba(100, 100, 100, 0.3)';
            
            // 绘制水印到图片右下角
            ctx.fillText(watermarkText, width - 20, height - 20);
        }
        
        /**
         * 保存图片
         */
        function saveImage() {
            if (!generatedCanvas) {
                alert('请先生成字幕图片！');
                return;
            }
            
            // 创建下载链接
            const link = document.createElement('a');
            link.download = 'subtitle_image_' + Date.now() + '.png';
            link.href = generatedCanvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
